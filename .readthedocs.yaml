version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"  
  apt_packages:
    - libgeos-dev
    - libproj-dev
  jobs:
    post_install:
      - pip install poetry
      - poetry config virtualenvs.create false
      - poetry install --with dev
      - sphinx-apidoc -f -o docs/source/ pygeoinf/

sphinx:
  configuration: docs/source/conf.py

version: 2

